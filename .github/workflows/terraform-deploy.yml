name: Terraform Deploy - Production

on:
  push:
    branches:
      - main
    paths:
      - 'hub/prod/**'
      - 'hub/modules/**'
  pull_request:
    branches:
      - main
    paths:
      - 'hub/prod/**'
      - 'hub/modules/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  TERRAFORM_VERSION: 1.5.0
  TERRAFORM_FOLDER: hub/prod
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: terraform-plan
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }'

      - name: Initialize Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform init

      - name: Format Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform fmt -recursive

      - name: Validate Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform validate

      - name: Plan Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ./${{ env.TERRAFORM_FOLDER }}/tfplan
          retention-days: 5

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: terraform-apply
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }'

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ./${{ env.TERRAFORM_FOLDER }}

      - name: Initialize Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform init

      - name: Apply Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf_outputs
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: |
          echo "vnet_id=$(terraform output -raw vnet_id)" >> $GITHUB_OUTPUT
          echo "app_gateway_ip=$(terraform output -raw app_gateway_public_ip)" >> $GITHUB_OUTPUT
          echo "vm_name=$(terraform output -raw vm_name)" >> $GITHUB_OUTPUT

      - name: Create Deployment Summary
        run: |
          echo "## Terraform Deployment Summary - Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- **Virtual Network ID:** ${{ steps.tf_outputs.outputs.vnet_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Application Gateway IP:** ${{ steps.tf_outputs.outputs.app_gateway_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Windows VM Name:** ${{ steps.tf_outputs.outputs.vm_name }}" >> $GITHUB_STEP_SUMMARY

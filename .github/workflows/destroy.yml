name: Terraform Destroy (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to destroy'
        required: true
        type: choice
        options:
          - prod
          - uat
      confirmation:
        description: 'Type "DESTROY" to confirm deletion'
        required: true
        type: string

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform-destroy:
    name: Destroy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation == 'DESTROY'
    environment:
      name: destroy-${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ./hub/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ./hub/${{ github.event.inputs.environment }}
        run: terraform destroy -auto-approve

      - name: Completion
        run: echo "✅ Infrastructure destroyed for ${{ github.event.inputs.environment }} environment"

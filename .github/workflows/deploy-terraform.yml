name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      apply:
        type: boolean
        description: Should terraform apply also run?
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - 'hub/prod/**'
      - 'hub/modules/**'
  pull_request:
    branches:
      - main
    paths:
      - 'hub/prod/**'
      - 'hub/modules/**'

env:
  TERRAFORM_VERSION: 1.5.0
  TERRAFORM_FOLDER: hub/prod
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ env.AZURE_CLIENT_ID }}
          client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform init

      - name: Format Check
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform fmt -check -recursive

      - name: Validate Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform validate

      - name: Plan Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.TERRAFORM_FOLDER }}
          path: ./${{ env.TERRAFORM_FOLDER }}/tfplan
          retention-days: 5

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event.inputs.apply == 'true')
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ env.AZURE_CLIENT_ID }}
          client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.TERRAFORM_FOLDER }}
          path: ./${{ env.TERRAFORM_FOLDER }}

      - name: Initialize Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform init

      - name: Apply Terraform
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf_outputs
        working-directory: ./${{ env.TERRAFORM_FOLDER }}
        run: |
          echo "vnet_id=$(terraform output -raw vnet_id)" >> $GITHUB_OUTPUT
          echo "app_gateway_ip=$(terraform output -raw app_gateway_public_ip)" >> $GITHUB_OUTPUT
          echo "vm_name=$(terraform output -raw vm_name)" >> $GITHUB_OUTPUT

      - name: Create Deployment Summary
        run: |
          echo "## Terraform Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Folder:** ${{ env.TERRAFORM_FOLDER }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- **Virtual Network ID:** ${{ steps.tf_outputs.outputs.vnet_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Application Gateway IP:** ${{ steps.tf_outputs.outputs.app_gateway_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Windows VM Name:** ${{ steps.tf_outputs.outputs.vm_name }}" >> $GITHUB_STEP_SUMMARY

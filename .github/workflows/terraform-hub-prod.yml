name: Terraform Hub - Prod

on:
  workflow_dispatch:
    inputs:
      apply:
        type: boolean
        description: Should terraform apply also run?
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - 'hub/prod/**'
      - 'hub/modules/**'
  pull_request:
    branches:
      - main
    paths:
      - 'hub/prod/**'
      - 'hub/modules/**'

permissions:
  contents: read

jobs:
  deploy-hub-prod:
    name: Deploy Hub - Production
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      terraform_folder: hub/prod
      environment: "production"
      apply: ${{ (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event.inputs.apply == 'true') }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

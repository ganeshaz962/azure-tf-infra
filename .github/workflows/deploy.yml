name: Deploy Terraform

on:
  workflow_call:
    inputs:
      name:
        type: string
        required: true
      environment:
        type: string
        required: true
      terraform_folder:
        type: string
        required: true
      runs_on:
        type: string
        required: false
        default: ubuntu-latest
      terraform_version:
        type: string
        required: false
        default: 1.7.0
      apply:
        type: boolean
        default: false
      terraform_destroy:
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ${{ inputs.runs_on }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.terraform_folder }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform Init
      run: |
        terraform init -input=false
        terraform --version

    - name: Terraform Format Check
      run: terraform fmt -check
      continue-on-error: true

    - name: Terraform Validate
      if: ${{ ! inputs.terraform_destroy }}
      run: terraform validate

    - name: Terraform Plan
      if: ${{ ! inputs.terraform_destroy }}
      run: terraform plan -input=false -out "terraform.plan" -no-color | tee plan.txt

    - name: Terraform Destroy Plan
      if: ${{ inputs.terraform_destroy }}
      run: |
        echo "🗑️ Creating destroy plan..."
        terraform plan -destroy -input=false -out "terraform.plan" -no-color | tee plan.txt
        echo "⚠️ WARNING: This will DESTROY all resources!"

    - name: Show Terraform Plan
      run: terraform show terraform.plan

    - name: Post Plan to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('${{ inputs.terraform_folder }}/plan.txt', 'utf8');
          const maxLength = 65000;
          const truncatedPlan = plan.length > maxLength ? plan.substring(0, maxLength) + '\n\n... (truncated)' : plan;
          
          const output = `## 📋 Terraform Plan - \`${{ inputs.name }}\`
          
          <details>
          <summary>Click to view plan</summary>
          
          \`\`\`terraform
          ${truncatedPlan}
          \`\`\`
          
          </details>
          
          **Environment:** ${{ inputs.environment }}
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

    - name: Copy current folder for archiving
      if: ${{ inputs.apply }}
      run: |
        cd ${GITHUB_WORKSPACE}
        mkdir -p ~/artifacts
        tar -czpf ~/artifacts/terraform.tar.gz .

    - name: Upload Plan Artifact
      if: ${{ inputs.apply }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}-plan-${{ github.run_id }}
        path: ~/artifacts/terraform.tar.gz
        retention-days: 1
        if-no-files-found: error

  approve:
    name: Await Approval
    needs: plan
    if: ${{ inputs.apply }}
    environment: ${{ inputs.environment }}
    runs-on: ${{ inputs.runs_on }}
    steps:
      - run: |
          if [ "${{ inputs.terraform_destroy }}" == "true" ]; then
            echo "⚠️ DESTROY operation approved for ${{ inputs.environment }}"
          else
            echo "✅ Deploy operation approved for ${{ inputs.environment }}"
          fi

  apply:
    name: Terraform Apply
    needs: approve
    runs-on: ${{ inputs.runs_on }}

    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.name }}-plan-${{ github.run_id }}

    - name: Extract artifact
      run: tar -xzf terraform.tar.gz

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
Completion Message
      run: |
        if [ "${{ inputs.terraform_destroy }}" == "true" ]; then
          echo "🗑️ Resources destroyed successfully"
        else
          echo "✅ Resources deployed successfully"
        fi

    - name: Terraform Output
      if: ${{ ! inputs.terraform_destroy }}
    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve "terraform.plan"
      working-directory: ${{ inputs.terraform_folder }}

    - name: Terraform Output
      run: terraform output -json
      working-directory: ${{ inputs.terraform_folder }}
      continue-on-error: true

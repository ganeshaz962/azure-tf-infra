name: Deploy Terraform (Reusable)

on:
  workflow_call:
    inputs:
      name:
        description: 'Deployment name'
        required: true
        type: string
      environment:
        description: 'GitHub environment for approval'
        required: true
        type: string
      terraform_folder:
        description: 'Path to terraform folder'
        required: true
        type: string
      apply:
        description: 'Whether to apply changes'
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VERSION: 1.7.0

jobs:
  terraform-plan:
    name: Plan - ${{ inputs.name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_folder }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ inputs.terraform_folder }}
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ${{ inputs.terraform_folder }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ inputs.terraform_folder }}
        run: |
          terraform plan -out=tfplan -no-color | tee plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.name }}
          path: |
            ${{ inputs.terraform_folder }}/tfplan
            ${{ inputs.terraform_folder }}/plan.txt
          retention-days: 5

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ inputs.terraform_folder }}/plan.txt', 'utf8');
            const maxLength = 65000;
            const truncatedPlan = plan.length > maxLength ? plan.substring(0, maxLength) + '\n\n... (truncated)' : plan;
            
            const output = `## 📋 Terraform Plan - \`${{ inputs.name }}\`
            
            <details>
            <summary>Click to view plan output</summary>
            
            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`
            
            </details>
            
            **Folder:** \`${{ inputs.terraform_folder }}\`
            **Triggered by:** @${{ github.actor }}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  terraform-apply:
    name: Apply - ${{ inputs.name }}
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: inputs.apply == true
    environment:
      name: ${{ inputs.environment }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_folder }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.name }}
          path: ${{ inputs.terraform_folder }}

      - name: Terraform Apply
        working-directory: ${{ inputs.terraform_folder }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        working-directory: ${{ inputs.terraform_folder }}
        run: terraform output -json

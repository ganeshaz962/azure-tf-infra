name: Terraform Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  TERRAFORM_VERSION: 1.5.0
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        environment: [prod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Terraform - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform init

      - name: Format Check - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform fmt -check -recursive

      - name: Validate - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform validate

      - name: Plan - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform plan -out=tfplan_${{ matrix.environment }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan_${{ matrix.environment }}
          path: ./hub/${{ matrix.environment }}/tfplan_${{ matrix.environment }}
          retention-days: 5

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    strategy:
      matrix:
        environment: [prod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan_${{ matrix.environment }}
          path: ./hub/${{ matrix.environment }}

      - name: Initialize Terraform - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform init

      - name: Apply - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform apply -auto-approve tfplan_${{ matrix.environment }}

      - name: Get Outputs
        id: tf_output
        working-directory: ./hub/${{ matrix.environment }}
        run: |
          echo "vnet_id=$(terraform output -raw vnet_id)" >> $GITHUB_OUTPUT
          echo "app_gateway_ip=$(terraform output -raw app_gateway_public_ip)" >> $GITHUB_OUTPUT
          echo "vm_name=$(terraform output -raw vm_name)" >> $GITHUB_OUTPUT

      - name: Create Deployment Summary
        run: |
          echo "## Terraform Deployment Summary - ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Created:" >> $GITHUB_STEP_SUMMARY
          echo "- Virtual Network ID: ${{ steps.tf_output.outputs.vnet_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Application Gateway IP: ${{ steps.tf_output.outputs.app_gateway_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- Windows VM Name: ${{ steps.tf_output.outputs.vm_name }}" >> $GITHUB_STEP_SUMMARY

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    strategy:
      matrix:
        environment: [prod]  # Requires manual approval via workflow_dispatch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Terraform - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform init

      - name: Destroy - ${{ matrix.environment }}
        working-directory: ./hub/${{ matrix.environment }}
        run: terraform destroy -auto-approve

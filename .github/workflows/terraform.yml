name: Terraform Azure Infrastructure

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VERSION: 1.7.0

jobs:
  # Job 1: Plan on Pull Request (PR Review)
  terraform-plan-pr:
    name: Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        env: [prod, uat]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./hub/${{ matrix.env }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ./hub/${{ matrix.env }}
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ./hub/${{ matrix.env }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ./hub/${{ matrix.env }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Post Plan to PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./hub/${{ matrix.env }}/plan.txt', 'utf8');
            const maxLength = 65000;
            const truncatedPlan = plan.length > maxLength ? plan.substring(0, maxLength) + '\n\n... (truncated)' : plan;
            
            const output = `## 📋 Terraform Plan - \`${{ matrix.env }}\`
            
            <details>
            <summary>Click to view plan output</summary>
            
            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`
            
            </details>
            
            **Plan Status:** ${{ steps.plan.outcome }}
            **Triggered by:** @${{ github.actor }}
            **Workflow:** [${{ github.workflow }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # Job 2: Plan on Main Branch
  terraform-plan-main:
    name: Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        env: [prod, uat]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./hub/${{ matrix.env }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ./hub/${{ matrix.env }}
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: ./hub/${{ matrix.env }}/tfplan
          retention-days: 5

  # Job 3: Manual Approval Before Apply
  approval:
    name: 🔐 Approval Required
    runs-on: ubuntu-latest
    needs: terraform-plan-main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    
    steps:
      - name: Wait for Approval
        run: echo "⏳ Waiting for manual approval to apply infrastructure changes..."

  # Job 4: Apply Infrastructure Changes
  terraform-apply:
    name: Apply (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: approval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        env: [prod, uat]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./hub/${{ matrix.env }}
        run: terraform init

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: ./hub/${{ matrix.env }}

      - name: Terraform Apply
        working-directory: ./hub/${{ matrix.env }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        working-directory: ./hub/${{ matrix.env }}
        run: terraform output -json

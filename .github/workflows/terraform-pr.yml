name: Terraform PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform-*.yml'

permissions:
  contents: read
  pull-requests: write  # needed to post plan output as PR comment

jobs:
  terraform-plan:
    name: Terraform Plan (PR)
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_vm_admin_password: ${{ secrets.TF_VAR_VM_ADMIN_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.3"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');

            const fmtStatus  = '${{ steps.fmt.outcome }}';
            const initStatus = '${{ steps.init.outcome }}';
            const valStatus  = '${{ steps.validate.outcome }}';
            const planStatus = '${{ steps.plan.outcome }}';

            const statusIcon = (s) => s === 'success' ? '✅' : '❌';

            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... output truncated ...'
              : planOutput;

            const body = `## Terraform Plan Results

            | Step | Status |
            |------|--------|
            | Format | ${statusIcon(fmtStatus)} \`${fmtStatus}\` |
            | Init   | ${statusIcon(initStatus)} \`${initStatus}\` |
            | Validate | ${statusIcon(valStatus)} \`${valStatus}\` |
            | Plan   | ${statusIcon(planStatus)} \`${planStatus}\` |

            <details>
            <summary>📋 Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Workflow: \`${{ github.workflow }}\` | Run: \`${{ github.run_id }}\`*`;

            // Delete previous bot comments to avoid clutter
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('Terraform Plan Results')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
